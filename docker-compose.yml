version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: smart-cs-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartcs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcs123}
      POSTGRES_DB: ${POSTGRES_DB:-smartcs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartcs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: smart-cs-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-network

  # Milvus 依赖 - etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: smart-cs-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - smart-cs-network

  # Milvus 依赖 - MinIO
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: smart-cs-minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - smart-cs-network

  # Milvus 向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: smart-cs-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    command: ["milvus", "run", "standalone"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - smart-cs-network

  # Kafka 消息队列
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smart-cs-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - smart-cs-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smart-cs-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - smart-cs-network

  # 订单服务
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: smart-cs-order-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartcs}:${POSTGRES_PASSWORD:-smartcs123}@postgres:5432/${POSTGRES_DB:-smartcs}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-cs-network

  # 物流服务
  logistics-service:
    build:
      context: ./services/logistics-service
      dockerfile: Dockerfile
    container_name: smart-cs-logistics-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartcs}:${POSTGRES_PASSWORD:-smartcs123}@postgres:5432/${POSTGRES_DB:-smartcs}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-cs-network

  # 工单服务
  ticket-service:
    build:
      context: ./services/ticket-service
      dockerfile: Dockerfile
    container_name: smart-cs-ticket-service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-smartcs}:${POSTGRES_PASSWORD:-smartcs123}@postgres:5432/${POSTGRES_DB:-smartcs}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/2
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-cs-network

  # 知识库服务
  knowledge-service:
    build:
      context: ./services/knowledge-service
      dockerfile: Dockerfile
    container_name: smart-cs-knowledge-service
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/3
    ports:
      - "8004:8004"
    depends_on:
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-cs-network

  # Dify API 服务
  dify-api:
    image: langgenius/dify-api:latest
    container_name: smart-cs-dify-api
    restart: always
    environment:
      # 核心配置
      MODE: api
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-sk-xxxxxxxxxxxxx}
      # 数据库配置
      DB_USERNAME: ${POSTGRES_USER:-smartcs}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartcs123}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-smartcs}
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      REDIS_DB: 4
      # 存储配置
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: storage
      # 向量数据库配置
      VECTOR_STORE: milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      # 服务配置
      CONSOLE_WEB_URL: http://localhost:80
      APP_WEB_URL: http://localhost:80
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - smart-cs-network

  # Dify Worker 服务
  dify-worker:
    image: langgenius/dify-api:latest
    container_name: smart-cs-dify-worker
    restart: always
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-sk-xxxxxxxxxxxxx}
      DB_USERNAME: ${POSTGRES_USER:-smartcs}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartcs123}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-smartcs}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      REDIS_DB: 4
      VECTOR_STORE: milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - smart-cs-network

  # Dify Web 前端
  dify-web:
    image: langgenius/dify-web:latest
    container_name: smart-cs-dify-web
    restart: always
    environment:
      CONSOLE_API_URL: http://dify-api:5001
      APP_API_URL: http://dify-api:5001
    ports:
      - "3000:3000"
    depends_on:
      - dify-api
    networks:
      - smart-cs-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: smart-cs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - dify-web
      - dify-api
      - order-service
      - logistics-service
      - ticket-service
      - knowledge-service
    networks:
      - smart-cs-network

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  dify_storage:

networks:
  smart-cs-network:
    driver: bridge
